<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Sports // CineArena</title>
<meta name="referrer" content="no-referrer">
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}

.shaka-video-container{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}

/* HelloSports Watermark */
#wm{
  position:absolute;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  z-index:2147483647;
  pointer-events:none;
  user-select:none;
  display:flex;
  align-items:center;
  gap:8px;
  opacity:.55;
  transition:opacity .5s;
}
.wm-rule{width:18px;height:1px;background:linear-gradient(90deg,transparent,rgba(232,0,29,.9))}
.wm-rule.r{background:linear-gradient(90deg,rgba(232,0,29,.9),transparent)}
.wm-inner{display:flex;flex-direction:column;align-items:center;gap:1px}
.wm-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:4px;line-height:1;color:#fff;white-space:nowrap;text-shadow:0 1px 8px #000,0 0 24px rgba(0,0,0,.9)}
.wm-name .r{color:#e8001d}
.wm-url{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:600;letter-spacing:3px;color:rgba(255,255,255,.7);white-space:nowrap;text-shadow:0 1px 6px rgba(0,0,0,.9);text-transform:uppercase}

@media(max-width:700px){
  #wm{bottom:60px}
  .wm-name{font-size:13px}
}
</style>
</head>
<body>

<div class="shaka-video-container" id="player-container">
  <video id="video" autoplay muted playsinline preload="metadata"></video>
  <div id="wm">
    <div class="wm-rule"></div>
    <div class="wm-inner">
      <div class="wm-name">HELLO<span class="r">SPORTS</span></div>
      <div class="wm-url">hellosports.live</div>
    </div>
    <div class="wm-rule r"></div>
  </div>
</div>

<script>
(function(){

  const CONFIG={
    streamUrl:"https://jiotvioslive.cdn.jio.com/bpk-tv/Star_Sports_HD1_BTS/output/index.mpd",
    keyId:"965dc2ddb1d85138ad787999a7f30ca5",
    key:"859695076e67fe961836b564db6d689c",
    cookieUrl:"https://allrounder-live4.pages.dev/api/cookie.json"
  };

  const PROXIES=[
    url=>`https://corsproxy.io/?${encodeURIComponent(url)}`,
    url=>`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url=>`https://cors-anywhere.herokuapp.com/${url}`,
  ];

  async function smartFetch(url,asJson=true){
    try{
      const r=await fetch(url,{cache:"no-store"});
      if(r.ok) return asJson?r.json():r.text();
    }catch{}
    for(const proxy of PROXIES){
      try{
        const r=await fetch(proxy(url),{cache:"no-store"});
        if(r.ok) return asJson?r.json():r.text();
      }catch{}
    }
    throw new Error("All fetch attempts failed");
  }

  document.addEventListener("DOMContentLoaded", async()=>{

    shaka.polyfill.installAll();
    if(!shaka.Player.isBrowserSupported()) return;

    const video=document.getElementById("video");
    const container=document.getElementById("player-container");
    const wm=document.getElementById("wm");

    video.muted=true;

    const player=new shaka.Player();
    await player.attach(video);

    const ui=new shaka.ui.Overlay(player,container,video);

    ui.configure({
      addBigPlayButton:true,
      controlPanelElements:["mute","play_pause","time_and_duration","spacer","quality","picture_in_picture","fullscreen"],
      seekBarColors:{base:"white",buffered:"red",played:"green"}
    });

    // Re-inject watermark above UI controls
    setTimeout(()=>container.appendChild(wm), 100);

    player.configure({
      drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}},
      manifest:{defaultPresentationDelay:5},
      streaming:{
        lowLatencyMode:true,
        bufferingGoal:10,
        rebufferingGoal:2,
        safeSeekOffset:5,
        retryParameters:{maxAttempts:3,baseDelay:500,backoffFactor:2}
      }
    });

    let cookieValue="";
    try{
      const data=await smartFetch(CONFIG.cookieUrl);
      cookieValue=data.cookie||"";
    }catch(e){ console.warn("Cookie fetch failed:",e.message); }

    // Always register filter — headers sent regardless of cookie
    player.getNetworkingEngine().registerRequestFilter((type,request)=>{
      request.headers["Referer"]="https://www.jiotv.com/";
      request.headers["Origin"]="https://www.jiotv.com";
      request.headers["User-Agent"]="plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
      if(cookieValue){
        request.headers["Cookie"]=cookieValue;
        let urlCookie=cookieValue.startsWith("__hdnea__=")?cookieValue.substring(10):cookieValue;
        if((type===shaka.net.NetworkingEngine.RequestType.MANIFEST||
            type===shaka.net.NetworkingEngine.RequestType.SEGMENT)&&
            !request.uris[0].includes("__hdnea__")){
          const sep=request.uris[0].includes("?")?"&":"?";
          request.uris[0]+=sep+"__hdnea__="+urlCookie;
        }
      }
    });

    try{
      await player.load(CONFIG.streamUrl);
      video.play().catch(()=>{});
    }catch(e){}

    video.addEventListener("play",()=>{ video.muted=false; });

    // Fullscreen watermark fix
    const onFsChange=()=>{
      const fsEl=document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement;
      if(fsEl){ fsEl.appendChild(wm); wm.style.opacity='.50'; }
      else{ container.appendChild(wm); wm.style.opacity='.55'; }
    };
    document.addEventListener('fullscreenchange',onFsChange);
    document.addEventListener('webkitfullscreenchange',onFsChange);
    document.addEventListener('mozfullscreenchange',onFsChange);

    // Watermark fade behaviour
    video.addEventListener('play',()=>setTimeout(()=>{ wm.style.opacity='.30'; },3000));
    video.addEventListener('pause',()=>{ wm.style.opacity='.55'; });
    const resetWm=()=>{
      wm.style.opacity='.55';
      clearTimeout(window._wmTimer);
      window._wmTimer=setTimeout(()=>{ if(!video.paused) wm.style.opacity='.30'; },3000);
    };
    document.addEventListener('mousemove',resetWm);
    document.addEventListener('touchstart',resetWm);

  });
})();
</script>

</body>
</html>
